<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Institutional Registration | NeuroScanAI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body class="auth-body">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Request Access</h2>
            <p>Register your neuro-oncology department</p>
        </div>

        <form id="signupForm">
            <div class="form-group">
                <label>Full Professional Name</label>
                <input type="text" id="newName" class="auth-input" placeholder="Dr. Your Name here " required>
            </div>
            <div class="form-group">
                <label>Institutional Email</label>
                <input type="email" id="newEmail" class="auth-input" placeholder="doctor@hospital.org" required>
            </div>
            <div class="form-group">
                <label>Set Security Key</label>
                <input type="password" id="newPassword" class="auth-input" placeholder="Minimum 8 characters" required>
            </div>
            <button type="submit" class="btn-cta" style="width: 100%; padding: 18px; margin-top: 1rem;">
                Grant Credentials
            </button>
        </form>

        <div class="auth-footer">
            Already registered? <a href="login.html">Sign In</a>
        </div>
    </div>
    <script src="auth.js"></script>
</body>
</html>
