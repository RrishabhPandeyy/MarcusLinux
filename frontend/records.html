<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Records | NeuroScanAI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="records.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dashboard-body">

    <aside class="sidebar">
        <div class="brand">NeuroScan<span style="color:var(--navy)">AI</span></div>
        <nav class="side-nav">
            <a href="dashboard.html" class="nav-item"><i data-lucide="layout-dashboard"></i> Diagnostic Console</a>
            <a href="records.html" class="nav-item active"><i data-lucide="clipboard-list"></i> Patient Records</a>
            <a href="docs.html" class="nav-item"><i data-lucide="file-text"></i> Documentation</a>
        </nav>


        <div class="sidebar-footer">
            <div class="user-profile" style="display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; padding: 0 10px;">
                <div class="avatar" id="user-avatar" style="width: 40px; height: 40px; background: #2563EB; color: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.9rem;">
                    ??
                </div>
                <div class="user-info">
                    <p id="user-display-name" style="font-weight: 700; font-size: 0.85rem; color: #1E293B; margin: 0;">Loading...</p>
                    <span style="font-size: 0.75rem; color: #64748B;">Neuro-Radiologist</span>
                </div>
            </div>

        </div>

    <button onclick="logout()" class="logout-btn">
        <i data-lucide="log-out" style="width:14px"></i> Terminate Session
    </button>
        </div>
    </aside>

    <main class="workspace">
        <header class="workspace-header">
            <div>
                <h1 style="font-size: 1.5rem; font-weight: 800;">Patient Records</h1>
                <p style="font-size: 0.85rem; color: #64748B;">Historical analysis and longitudinal data</p>
            </div>
            <div class="search-bar">
                <i data-lucide="search" style="width:16px; color:#94A3B8"></i>
                <input type="text" placeholder="Search Patient ID or Name..." id="recordSearch">
            </div>
        </header>

        <div class="card table-container">
            <table class="records-table">
                <thead>
                    <tr>
                        <th>Patient ID</th>
                        <th>Full Name</th>
                        <th>Last Scan</th>
                        <th>AI Findings</th>
                        <th>Confidence</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="records-body">
                    </tbody>
            </table>
        </div>
    </main>

    <script src="auth.js"></script>
    <script src="records.js"></script>
</body>
</html>
