<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Authorized Login | NeuroScanAI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body class="auth-body">
    <div class="auth-card">
        <div class="auth-header">
            <div class="brand" style="margin-bottom: 1rem;">NeuroScan<span style="color:var(--navy)">AI</span></div>
            <h2>Clinician Portal</h2>
            <p>Enter your institutional credentials</p>
        </div>

        <div id="login-error" class="error-banner">Invalid Security Key or ID. Access Denied.</div>

        <form id="loginForm">
            <div class="form-group">
                <label>Hospital ID / Email</label>
                <input type="email" id="email" class="auth-input" placeholder="doctor@hospital.org" required>
            </div>
            <div class="form-group">
                <label>Security Key</label>
                <input type="password" id="password" class="auth-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-cta" style="width: 100%; padding: 18px; margin-top: 1rem;">
                Initialize Session
            </button>
        </form>

        <div class="auth-footer">
            New Institution? <a href="signup.html">Request Registration</a>
        </div>
    </div>
    <script src="auth.js"></script>
</body>
</html>
